# @format

name: Backend CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pharmachain_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pharmachain_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/pharmachain_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.13
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          # Install runtime plus test-only dependencies used by CI.
          python -m pip install -r backend/requirements-dev.txt

      - name: Compile Python source
        run: python -m compileall backend

      - name: Run backend tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: pytest tests -ra

      - name: Build backend Docker image
        run: docker build --file backend/Dockerfile --tag pharmachain-backend:ci backend

      - name: Validate Docker Compose file
        working-directory: backend
        run: docker compose config
