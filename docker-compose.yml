# @format

version: "3.9"

services:
  db:
    image: postgres:16
    container_name: pharmachain-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: pharmachain
      POSTGRES_USER: pharmachain
      POSTGRES_PASSWORD: pharmachain

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend

    container_name: pharmachain-api

    depends_on:
      - db

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://pharmachain:pharmachain@db:5432/pharmachain

volumes:
  postgres_data:
