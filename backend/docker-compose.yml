services:

  db:
    image: postgres:16
    container_name: pharmachain-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: pharmachain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharmachain"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend

    container_name: pharmachain-api

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/pharmachain
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}

    restart: unless-stopped

volumes:
  postgres_data: